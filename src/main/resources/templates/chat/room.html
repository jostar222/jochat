<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${room.roomName}">채팅방</title>

    <link rel="stylesheet" href="/css/chat.css">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body>

<div class="container">

    <!-- 좌측 채팅방 리스트 -->
    <div class="sidebar">
        <div th:each="r : ${rooms}" class="room-item">
            <a th:href="@{/chat/rooms/{id}(id=${r.roomId})}"
               th:text="${r.roomName}"></a>
        </div>
    </div>

    <!-- 우측 채팅 -->
    <div class="chat-area">

        <!-- 상단 -->
        <div class="chat-header" th:text="${room.roomName}"></div>

        <!-- 메시지 영역 -->
        <div id="chatBody" class="chat-body"></div>

        <!-- 입력 -->
        <div class="chat-footer">
            <input type="text" id="messageInput" placeholder="메시지 입력">
            <button id="sendBtn">전송</button>
        </div>

    </div>
</div>

<script th:inline="javascript">
    const roomId = [[${room.id}]];
    const loginUserId = [[${loginUserId}]];
</script>

<script>
    const chatBody = document.getElementById('chatBody');
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    let stompClient = null;

    // =========================
    // UI
    // =========================
    function renderMessage(msg) {
        const isMe = msg.senderId === loginUserId;

        // 시간 그룹 표시
        if (msg.time !== lastTime) {
            const timeDiv = document.createElement('div');
            timeDiv.className = 'time-divider';
            timeDiv.textContent = msg.time;

            chatBody.appendChild(timeDiv);
            lastTime = msg.time;
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'message ' + (isMe ? 'me' : 'other');

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = msg.content;

        const time = document.createElement('div');
        time.className = 'time';
        time.textContent = msg.time;

        // 위치 다르게
        if (isMe) {
            wrapper.appendChild(time);
            wrapper.appendChild(bubble);
        } else {
            wrapper.appendChild(bubble);
            wrapper.appendChild(time);
        }

        // 상대 메시지 위 닉네임 표시
        if (!isMe) {
            const name = document.createElement('div');
            name.style.fontSize = '12px';
            name.style.color = '#555';
            name.textContent = msg.senderNickname;

            wrapper.appendChild(name);
        }

        chatBody.appendChild(wrapper);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    // 기존 메시지 로딩 시 초기화
    function clearMessages() {
        chatBody.innerHTML = '';
        lastTime = null;
    }

    // =========================
    // API
    // =========================
    async function loadMessages() {
        const res = await fetch(`/api/chat/rooms/${roomId}/messages`);
        const data = await res.json();

        clearMessages();
        data.forEach(renderMessage);
    }

    // =========================
    // WebSocket
    // =========================
    function connect() {
        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, () => {
            stompClient.subscribe(`/sub/chat.room.${roomId}`, (msg) => {
                renderMessage(JSON.parse(msg.body));
            });
        });
    }

    function sendMessage() {
        const content = input.value.trim();
        if (!content) return;

        stompClient.send('/pub/chat.send', {}, JSON.stringify({
            roomId: roomId,
            content: content
        }));

        input.value = '';
    }

    // =========================
    // 이벤트
    // =========================
    sendBtn.addEventListener('click', sendMessage);

    // Enter 전송 UX 개선
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // =========================
    // init
    // =========================
    loadMessages();
    connect();
</script>

</body>
</html>
