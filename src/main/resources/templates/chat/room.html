<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${room.roomName}">채팅방</title>
    <link rel="stylesheet" href="/css/chat.css">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="sidebar-header">채팅</div>

        <div class="room-list">
            <a th:each="r : ${rooms}"
               th:href="@{/chat/rooms/{roomId}(roomId=${r.roomId})}"
               class="room-item"
               th:attr="data-room-id=${r.roomId}"
               th:classappend="${selectedRoomId != null and selectedRoomId == r.roomId} ? ' active'">

                <div class="room-top">
                    <div class="room-name" th:text="${r.roomName}">채팅방명</div>
                    <div class="room-time"
                         th:text="${r.lastMessageTime != null ? #temporals.format(r.lastMessageTime, 'HH:mm') : ''}">
                        14:30
                    </div>
                </div>

                <div class="room-bottom">
                    <div class="room-last-message"
                         th:text="${r.lastMessage != null and !#strings.isEmpty(r.lastMessage) ? r.lastMessage : '대화를 시작해보세요.'}">
                        마지막 메시지
                    </div>
                </div>
            </a>
        </div>

        <div class="user-section">
            <div class="user-section-title">새 대화 시작</div>

            <div th:each="user : ${users}" class="user-item">
                <div class="user-name" th:text="${user.nickname}">사용자명</div>

                <form method="post" th:action="@{/chat/rooms/direct}">
                    <input type="hidden" name="targetUserId" th:value="${user.id}">
                    <button type="submit" class="start-chat-btn">채팅하기</button>
                </form>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header" th:text="${room.roomName}">채팅방명</div>
        <div id="chatBody" class="chat-body"></div>

        <div class="chat-footer">
            <input type="text" id="messageInput" placeholder="메시지를 입력하세요">
            <button id="sendBtn">전송</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const roomId = [[${room.id}]];
    const loginUserId = [[${loginUserId}]];
</script>

<script>
    const chatBody = document.getElementById('chatBody');
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    let stompClient = null;
    let lastTime = null;

    function clearMessages() {
        chatBody.innerHTML = '';
        lastTime = null;
    }

    function renderMessage(msg) {
        const isMe = msg.senderId === loginUserId;

        if (msg.time !== lastTime) {
            const timeDiv = document.createElement('div');
            timeDiv.className = 'time-divider';
            timeDiv.textContent = msg.time;
            chatBody.appendChild(timeDiv);
            lastTime = msg.time;
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'message ' + (isMe ? 'me' : 'other');

        const contentGroup = document.createElement('div');

        if (isMe) {
            contentGroup.className = 'message-content-group';
        } else {
            contentGroup.className = 'message-content-group';
        }

        const bubbleWrap = document.createElement('div');

        if (!isMe) {
            const name = document.createElement('div');
            name.className = 'sender-name';
            name.textContent = msg.senderNickname;
            bubbleWrap.appendChild(name);
        }

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = msg.content;

        const time = document.createElement('div');
        time.className = 'time';
        time.textContent = msg.time;

        bubbleWrap.appendChild(bubble);

        if (isMe) {
            contentGroup.appendChild(time);
            contentGroup.appendChild(bubbleWrap);
        } else {
            contentGroup.appendChild(bubbleWrap);
            contentGroup.appendChild(time);
        }

        wrapper.appendChild(contentGroup);
        chatBody.appendChild(wrapper);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    async function loadMessages() {
        const res = await fetch(`/api/chat/rooms/${roomId}/messages`);
        const data = await res.json();

        clearMessages();
        data.forEach(renderMessage);
    }

    function connect() {
        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, () => {
            stompClient.subscribe(`/sub/chat.room.${roomId}`, (message) => {
                const parsed = JSON.parse(message.body);
                renderMessage(parsed);
                updateRoomListPreview(parsed);
            });
        });
    }

    function sendMessage() {
        const content = input.value.trim();
        if (!content) return;

        stompClient.send('/pub/chat.send', {}, JSON.stringify({
            roomId: roomId,
            content: content
        }));

        input.value = '';
        input.focus();
    }

    function formatRoomListTime(timeText) {
        if (!timeText) return '';
        return timeText.replace('오전 ', '').replace('오후 ', '');
    }

    function updateRoomListPreview(message) {
        const roomItem = document.querySelector(`.room-item[data-room-id="${message.roomId}"]`);
        if (!roomItem) return;

        const lastMessageEl = roomItem.querySelector('.room-last-message');
        const timeEl = roomItem.querySelector('.room-time');
        const roomList = document.querySelector('.room-list');

        if (lastMessageEl) {
            lastMessageEl.textContent = message.content;
        }

        if (timeEl) {
            timeEl.textContent = formatRoomListTime(message.time);
        }

        if (roomList && roomList.firstElementChild !== roomItem) {
            roomList.prepend(roomItem);
        }
    }

    sendBtn.addEventListener('click', sendMessage);

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    loadMessages();
    connect();
</script>

</body>
</html>
