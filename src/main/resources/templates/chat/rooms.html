<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>채팅</title>
    <link rel="stylesheet" href="/css/chat.css">
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="sidebar-header">채팅</div>

        <div class="room-list">
            <a th:each="r : ${rooms}"
               th:href="@{/chat/rooms/{roomId}(roomId=${r.roomId})}"
               class="room-item"
               th:attr="data-room-id=${r.roomId}"
               th:classappend="${selectedRoomId != null and selectedRoomId == r.roomId} ? ' active'">

                <div class="room-top">
                    <div class="room-name" th:text="${r.roomName}">채팅방명</div>
                    <div class="room-time"
                         th:text="${r.lastMessageTime != null ? #temporals.format(r.lastMessageTime, 'HH:mm') : ''}">
                        14:30
                    </div>
                </div>

                <div class="room-bottom">
                    <div class="room-last-message"
                         th:text="${r.lastMessage != null and !#strings.isEmpty(r.lastMessage) ? r.lastMessage : '대화를 시작해보세요.'}">
                        마지막 메시지
                    </div>
                </div>
            </a>
        </div>

        <div class="user-section">
            <div class="user-section-title">새 대화 시작</div>

            <div th:each="user : ${users}" class="user-item">
                <div class="user-name" th:text="${user.nickname}">사용자명</div>

                <form method="post" th:action="@{/chat/rooms/direct}">
                    <input type="hidden" name="targetUserId" th:value="${user.id}">
                    <button type="submit" class="start-chat-btn">채팅하기</button>
                </form>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-empty">
            대화할 채팅방을 선택하세요.
        </div>
    </div>
</div>

</body>
</html>
